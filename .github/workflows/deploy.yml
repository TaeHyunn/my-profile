name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트
        run: npm test -- --run

      - name: 린트
        run: npm run lint

      - name: 빌드
        run: npm run build

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 빌드 결과 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
